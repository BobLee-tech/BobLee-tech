name: Generate Snake Animation

on:
  # 每天自动运行一次
  schedule:
    - cron: "0 0 * * *" 
  # 允许你随时手动点击运行
  workflow_dispatch:
  # 每次推送到 main 分支时运行
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # 生成高级像素风 Digital Oasis 动画
      - name: generate digital-oasis-pursuit.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # 这里使用了专门的配置参数来生成特定主题的动画
          outputs: |
            dist/digital-oasis-pursuit.svg?palette=github-dark&#39C5BB=#39C5BB
            dist/digital-oasis-pursuit-dark.svg?palette=github-dark&#39C5BB=#39C5BB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # 将生成的 SVG 文件推送到 output 分支
      - name: push digital-oasis-pursuit.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
